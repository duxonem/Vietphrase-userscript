<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Cấu hình Vietphrase Converter</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .modal { width: 550px; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); overflow: hidden; background: white; }
    .tab-header { display: flex; border-bottom: 1px solid #ddd; gap: 3px; background: #f5f5f5; }
    .tab-btn { flex: 1; padding: 14px; border: none; cursor: pointer; background: none; font-weight: bold; font-size: 14px; transition: 0.3s; }
    .tab-btn.active { color: darkblue; border-bottom: 3px solid blue; background: white; }
    .tab-content { display: none; padding: 25px; min-height: 280px; }
    .tab-content.active { display: block; }
    .form-row { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
    label { min-width: 120px; font-size: 14px; color: #333; }
    input[type="text"], textarea { padding: 6px; border: 1px solid #ccc; border-radius: 4px; flex: 1; }
    #dynamic-container { max-height: 140px; overflow-y: auto; border: 1px dashed #ccc; padding: 10px; border-radius: 4px; }
    .dynamic-row { margin-bottom: 8px; }
    .large-textarea { width: 100%; height: 70px; margin-top: 10px; resize: none; box-sizing: border-box; }
    .modal-footer { padding: 15px 25px; border-top: 1px solid #eee; display: flex; gap: 15px; justify-content: flex-end; background: #f9f9f9; }
    .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
    .btn-ok { background: rgb(17, 61, 255); color: white; }
    .btn-ok:hover { background: #1d4ed8; }
    hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    .status-msg { color: green; font-size: 13px; align-self: center; margin-right: auto; display: none; }
  </style>
</head>
<body>
  <div class="modal">
    <div class="tab-header">
      <button class="tab-btn active" data-tab="tab1">Từ điển</button>
      <button class="tab-btn" data-tab="tab2">Dịch</button>
      <button class="tab-btn" data-tab="tab3">Tự động</button>
    </div>
    <div id="tab1" class="tab-content active">
      <div class="form-row"><label>Phiên âm</label><input id="PhienAm" prior="1" type="file"></div>
      <div class="form-row"><label>Vietphrase</label><input id="Vietphrase" prior="2" type="file"></div>
      <div class="form-row"><label>Names</label><input id="Names" prior="3" type="file"></div>
    </div>
    <div id="tab2" class="tab-content">
      <div class="form-row"><input type="checkbox" id="Ngoac"> <label for="Ngoac">Dùng [ngoặc]</label></div>
      <div class="form-row">
        <input type="checkbox" id="Motnghia"> <label for="Motnghia">Một nghĩa</label>
        Dấu cách:<input type="text" maxlength="2" style="width: 50px; flex: none;" id="daucach">
      </div>
      <div class="form-row"><input type="checkbox" id="DichLieu"> <label for="DichLieu">Xóa đích, liễu, trứ</label></div>
    </div>
    <div id="tab3" class="tab-content">
      <div class="form-row"><label>Font thế:</label><input type="text" id="font"></div>
      <hr>
      <div id="dynamic-container">Các site tự chạy:</div>
      <hr>
      <label>Các site không chạy (ngăn cách bằng dấu phẩy):</label>
      <textarea class="large-textarea" id="blackListText"></textarea>
    </div>
    <div class="modal-footer">
      <span id="status" class="status-msg">Đang lưu cấu hình...!</span>
      <button class="btn btn-ok" id="saveOptionsBtn">Lưu cài đặt</button>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
